global:
  edition: ce

  hosts:
    domain: localhost
    https: false

  ingress:
    configureCertmanager: false

  psql:
    host: gitlab-postgresql
    port: 5432
    password:
      secret: gitlab-postgresql-password
      key: password

  redis:
    host: gitlab-redis-master

  appConfig:
    enableUsagePing: false
    enableSeatLink: false

# -----------------------------
# DISABLED HEAVY COMPONENTS
# -----------------------------
certmanager:
  install: false

nginx-ingress:
  enabled: false

prometheus:
  install: false

registry:
  enabled: false

gitlab-runner:
  install: false

# -----------------------------
# CORE SERVICES LIGHT MODE
# -----------------------------
gitlab:
  webservice:
    replicas: 1
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  sidekiq:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  toolbox:
    enabled: true

  migrations:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi

# -----------------------------
# DATABASE (IMPORTANT STABILITY FIX)
# -----------------------------
postgresql:
  install: true
  primary:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# -----------------------------
# REDIS (CRASH FIX)
# -----------------------------
redis:
  install: true
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# -----------------------------
# GITALY (lightened)
# -----------------------------
gitaly:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------
# DISABLE AUTO SCALING (IMPORTANT)
# -----------------------------
gitlab-exporter:
  enabled: false

gitlab-shell:
  replicas: 1
