# ─────────────────────────────────────────────────────────────────────────────
#  GitLab CE — minimal Helm values for K3d (bonus part)
#  Chart ≥19: use installCertmanager (not certmanager.install)
# ─────────────────────────────────────────────────────────────────────────────

installCertmanager: false

global:
  edition: ce

  hosts:
    domain: gitlab.local
    https: false
    gitlab:
      name: gitlab.local
      https: false
    minio:
      name: minio.gitlab.local

  gatewayApi:
    enabled: false

  ingress:
    class: traefik
    configureCertmanager: false
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: web
    tls:
      enabled: false

  kas:
    enabled: false

  minio:
    enabled: true

  appConfig:
    initialDefaults:
      signupEnabled: false

nginx-ingress:
  enabled: false

prometheus:
  install: false

gitlab-runner:
  install: false

registry:
  enabled: false

# ── GitLab application components ─────────────────────────────────────────────

gitlab:
  kas:
    enabled: false

  webservice:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  # gitlab-shell handles SSH git operations (optional for HTTP-only setup)
  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi

  gitaly:
    persistence:
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 200Mi

  toolbox:
    backups:
      cron:
        enabled: false

# ── Supporting services ───────────────────────────────────────────────────────

minio:
  # Internal object storage for uploads, LFS, artifacts, etc.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  persistence:
    size: 5Gi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi

postgresql:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  primary:
    persistence:
      size: 5Gi

# Cert-manager issuer email required by the GitLab chart for TLS
# Set to a placeholder or your real email to receive certificate notices.
certmanager-issuer:
  email: admin@gitlab.local

# Enable bundled services for a local demo (not for production)
postgresql:
  install: true
  # minimal password for bundled postgres (change for real deployments)
  postgresql:
    auth:
      password: gitlab-postgres-pass

redis:
  install: true
  password: redis-pass

## Note: MinIO configuration is under `global.minio` for this chart version.
