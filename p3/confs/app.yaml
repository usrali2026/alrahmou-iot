apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wil-app
  namespace: argocd
spec:
  project: default
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/usrali2026/Inception_of_Things_alrahmou.git
    targetRevision: HEAD
    path: p3/confs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
