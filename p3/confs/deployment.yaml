---
# ─────────────────────────────────────────────────────────────────────────────
#  To upgrade: change the image tag (v1 → v2) and git push.
#  ArgoCD will detect the diff and perform a rolling update automatically.
#
#  GitOps repo (Argo CD source): push-gitops.sh copies from p3/gitops/
#  Version bump in that repo:
#    sed -i 's/playground:v1/playground:v2/' deployment.yaml
#    git add deployment.yaml && git commit -m "v2" && git push
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playground
  template:
    metadata:
      labels:
        app: playground
    spec:
      containers:
      - name: playground
        image: wil42/playground:v1
        ports:
        - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: playground
  namespace: dev
spec:
  type: NodePort
  selector:
    app: playground
  ports:
  - port: 8888
    targetPort: 8888
    nodePort: 30888   # mapped to host port 8888 via k3d --port flag
