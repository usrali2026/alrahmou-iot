---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app2-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head><title>App 2</title></head>
      <body>
        <h1>App 2</h1>
        <p>Reached via <strong>app2.com</strong> — 3 replicas running</p>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: app2-html
---
apiVersion: v1
kind: Service
metadata:
  name: app2
  namespace: default
spec:
  selector:
    app: app2
  ports:
  - port: 80
    targetPort: 80
