---
# ─────────────────────────────────────────────────────────────────────────────
#  Replace repoURL with your public GitHub repo (deployment.yaml at p3/confs).
#  Publish the manifest first: ./p3/scripts/push-gitops.sh
#  Example: https://github.com/yourlogin/yourlogin-iot
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playground
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/usrali2026/alrahmou-iot.git
    targetRevision: HEAD
    path: p3/confs   # deployment.yaml lives in p3/confs

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true      # delete resources removed from git
      selfHeal: true   # revert manual kubectl changes
    syncOptions:
    - CreateNamespace=true
